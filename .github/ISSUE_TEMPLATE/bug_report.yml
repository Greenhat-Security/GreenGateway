name: Bug report
description: Report a reproducible problem in GreenGateway.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what were you trying to do?
      placeholder: Describe the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable set of steps that triggers the problem.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Example: OS name and version"
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: "Output of: rustc --version"
    validations:
      required: false
  - type: input
    id: greengateway-version
    attributes:
      label: GreenGateway version or commit
      placeholder: "Example: v0.1.0, main@abc1234, or commit abc1234"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only relevant logs. Do not include secrets, tokens, API keys, private URLs, or credentials.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have removed secrets, tokens, API keys, private URLs, and credentials from this report.
          required: true
