name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  egress-only:
    name: egress-only
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce egress-only outbound HTTP
        run: bash scripts/check-egress-only.sh

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  dev-traffic-smoke:
    name: dev-traffic-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run dev traffic smoke test
        shell: bash
        run: |
          set -eu

          compose_files="-f docker-compose.yml -f docker-compose.dev.yml"

          cleanup() {
            docker compose $compose_files down -v || true
          }
          trap cleanup EXIT

          docker compose $compose_files up -d --build

          healthy=0
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" -ne 1 ]; then
            docker compose $compose_files logs gateway dev-jwks dev-echo
            exit 1
          fi

          set +e
          node scripts/generate-traffic.mjs --smoke-test
          smoke_status=$?
          set -e

          exit "$smoke_status"

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
