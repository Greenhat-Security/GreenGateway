name: Engineering task
description: Track a small, well-scoped task suitable for one pull request.
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: Describe the task and any relevant context.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the concrete conditions that make this task complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent issue or phase
      description: Which parent issue, roadmap phase, or larger effort does this belong to?
      placeholder: "Example: Part of #1, Phase 0"
    validations:
      required: true
